<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FamilyHub - Calendar</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
    }

    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #6c63ff;
      --primary-dark: #564ee8;
      --primary-light: #eeecff;
      --shadow: 0 10px 24px rgba(31, 41, 55, 0.08);
      --radius-xl: 24px;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 100px;
    }

    .app {
      padding: 18px 16px 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .brand h1 {
      color: var(--primary);
      font-size: 1.8rem;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .hero {
      background: linear-gradient(135deg, var(--primary), #8e88ff);
      color: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .hero-btn {
      background: white;
      color: var(--primary);
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-top: 10px;
    }

    .card {
      background: white;
      border-radius: var(--radius-xl);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-name {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: bold;
    }

    .calendar-day {
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      background: #f9fafc;
      font-size: 0.85rem;
    }

    .calendar-day:empty {
      background: transparent;
    }

    .active {
      background: var(--primary);
      color: white;
      font-weight: bold;
    }

    .event-day {
      border: 2px solid var(--primary);
      font-weight: bold;
    }

    .input-row {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .input-row input,
    .input-row select {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    .main-button {
      margin-top: 12px;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 430px;
      display: flex;
      justify-content: space-around;
      background: white;
      border-top: 1px solid #ddd;
      padding: 10px;
    }

    .nav-item {
      text-align: center;
      font-size: 0.75rem;
      text-decoration: none;
      color: gray;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <header class="topbar">
      <div class="brand">
        <h1>FamilyHub</h1>
      </div>
      <div class="avatar">FH</div>
    </header>

    <!-- HERO -->
    <section class="hero">
      <h2>Family Calendar</h2>
      <p>View and manage all events in one place.</p>
      <a href="#add-event-section" class="hero-btn">+ Add Event</a>
    </section>

    <!-- CALENDAR -->
    <section class="card">
      <h3>April 2026</h3>

      <div class="calendar-grid">
        <!-- Days -->
        <div class="day-name">Sun</div>
        <div class="day-name">Mon</div>
        <div class="day-name">Tue</div>
        <div class="day-name">Wed</div>
        <div class="day-name">Thu</div>
        <div class="day-name">Fri</div>
        <div class="day-name">Sat</div>

        <!-- Empty slots -->
        <div class="calendar-day"></div>
        <div class="calendar-day"></div>
        <div class="calendar-day"></div>

        <!-- Full Month -->
        <div class="calendar-day">1</div>
        <div class="calendar-day">2</div>
        <div class="calendar-day">3</div>
        <div class="calendar-day">4</div>
        <div class="calendar-day">5</div>
        <div class="calendar-day">6</div>
        <div class="calendar-day">7</div>
        <div class="calendar-day">8</div>
        <div class="calendar-day">9</div>
        <div class="calendar-day">10</div>
        <div class="calendar-day">11</div>
        <div class="calendar-day">12</div>
        <div class="calendar-day event-day">13</div>
        <div class="calendar-day">14</div>
        <div class="calendar-day active">15</div>
        <div class="calendar-day">16</div>
        <div class="calendar-day event-day">17</div>
        <div class="calendar-day">18</div>
        <div class="calendar-day">19</div>
        <div class="calendar-day">20</div>
        <div class="calendar-day">21</div>
        <div class="calendar-day">22</div>
        <div class="calendar-day">23</div>
        <div class="calendar-day">24</div>
        <div class="calendar-day">25</div>
        <div class="calendar-day">26</div>
        <div class="calendar-day">27</div>
        <div class="calendar-day">28</div>
        <div class="calendar-day">29</div>
        <div class="calendar-day">30</div>
      </div>
    </section>

    <!-- ADD EVENT -->
    <section class="card" id="add-event-section">
      <h3>Add Event</h3>

      <div class="input-row">
        <input type="text" placeholder="Event name" />
        <select>
          <option>Assign to</option>
          <option>Mom</option>
          <option>Dad</option>
          <option>William</option>
          <option>Hailey</option>
        </select>
        <select>
          <option>Time</option>
          <option>8:00 AM</option>
          <option>4:30 PM</option>
          <option>6:30 PM</option>
        </select>
      </div>

      <button class="main-button">+ Add Event</button>
    </section>

  </div>

  <!-- NAV -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">🏠 Home</a>
    <a href="calendar.html" class="nav-item active">📅 Calendar</a>
    <a href="index.html#add-chore-section" class="nav-item">✅ Chores</a>
    <a href="#" class="nav-item">🎯 Goals</a>
    <a href="#" class="nav-item">⚙️ Settings</a>
  </nav>

</body>
</html>
